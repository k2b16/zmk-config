# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

CONFIG_ZMK_USB=y
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_SYSTEM=y

# Enable Nice View Customization (Optional but recommended)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y

# Set display driver to SHARP Memory Display
CONFIG_SHARP_MEMORY=y
CONFIG_SHARP_MEMORY_HEIGHT=68
CONFIG_SHARP_MEMORY_WIDTH=160
CONFIG_SHARP_MEMORY_COM_INVERSION=y
